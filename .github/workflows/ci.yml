name: CI
on:
  push: { branches: [main] }
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
  packages: write
jobs:
  build:
    uses: angelocp-01/logistics-infrastructure/.github/workflows/node-service.yml@main
    with:
      service-name: user-service
      node-version: "20"
      push-image: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}
    secrets: inherit
